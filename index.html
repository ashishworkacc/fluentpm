<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#060818" />
    <meta name="description" content="Train your voice. Own the room. AI-powered PM communication practice." />
    <title>FluentPM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --color-primary: #6366f1;
        --color-secondary: #8b5cf6;
        --color-highlight: #06b6d4;
        --color-bg: #060818;
        --color-text-primary: #f1f5f9;
        --color-text-secondary: #94a3b8;
        --color-success: #10b981;
        --color-warning: #f59e0b;
        --color-danger: #f43f5e;
        --glass-surface: rgba(255, 255, 255, 0.06);
        --glass-border: rgba(255, 255, 255, 0.1);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        height: 100%;
        min-height: 100dvh;
        background:
          radial-gradient(ellipse at 20% 20%, rgba(99,102,241,0.18) 0%, transparent 45%),
          radial-gradient(ellipse at 80% 10%, rgba(139,92,246,0.15) 0%, transparent 40%),
          radial-gradient(ellipse at 70% 80%, rgba(6,182,212,0.12) 0%, transparent 45%),
          radial-gradient(ellipse at 10% 80%, rgba(168,85,247,0.1) 0%, transparent 40%),
          #060818;
        background-attachment: fixed;
        color: #f1f5f9;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overscroll-behavior: none;
      }

      #root {
        height: 100%;
        min-height: 100dvh;
      }

      @keyframes pulse-ring {
        0% { transform: scale(1); opacity: 1; }
        100% { transform: scale(1.3); opacity: 0; }
      }

      @keyframes breathe {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.04); }
      }

      @keyframes slideUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }

      @keyframes shimmer {
        from { background-position: 0% center; }
        to { background-position: 200% center; }
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @keyframes blink {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
